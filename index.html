<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>SKOPE — Vail Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{ --bg:#3A4152; --card:rgba(255,255,255,.07); --line:rgba(255,255,255,.12);
    --peach:#E9A57F; --peach2:#D68F68; --gold:#EBC77E; --bad:#E08585; --good:#7FD69B;
    --white:#FFF; --mut:#C1C7D4; --mut2:#9BA2B1; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;}
  body{background:var(--bg);font-family:'Poppins',system-ui,sans-serif;color:var(--white);
    display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(70% 22% at 88% 0%, rgba(233,165,127,.15), rgba(233,165,127,0) 60%);}
  header{flex-shrink:0;padding:calc(env(safe-area-inset-top) + 9px) 11px 9px;
    background:rgba(0,0,0,.24);border-bottom:1px solid var(--line);}
  .hrow{display:flex;align-items:center;gap:8px;}
  .nav{width:40px;height:40px;border-radius:11px;background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white);font-size:18px;font-weight:700;}
  .nav:active{background:rgba(255,255,255,.2);}
  .htitle{flex:1;min-width:0;text-align:center;}
  .htitle b{font-size:15px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .htitle span{font-size:9.5px;color:var(--mut2);letter-spacing:.06em;}
  .htitle span i{color:var(--peach);font-style:normal;font-weight:700;}
  .bar{height:4px;border-radius:4px;background:rgba(255,255,255,.14);margin-top:8px;overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--peach2),var(--peach));transition:width .3s;}
  .srow{display:flex;align-items:center;gap:7px;margin-top:8px;}
  .stat{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    padding:4px 8px;border-radius:100px;border:1px solid var(--line);color:var(--mut2);flex-shrink:0;}
  .stat.ok{color:var(--good);border-color:rgba(127,214,155,.45);}
  .stat.no{color:var(--bad);border-color:rgba(224,133,133,.5);}
  .srow .sp{flex:1;}
  .mini{font-size:10.5px;font-weight:700;padding:6px 11px;border-radius:9px;border:1px solid var(--line);
    background:var(--card);color:var(--white);font-family:inherit;letter-spacing:.04em;}
  .mini.p{background:var(--peach);color:#2E3542;border:none;}
  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 11px 20px;}
  main::-webkit-scrollbar{width:0;}
  .jump{display:flex;gap:5px;overflow-x:auto;padding:0 0 10px;}
  .jump::-webkit-scrollbar{height:0;}
  .jl{flex-shrink:0;font-size:11px;font-weight:700;padding:7px 11px;border-radius:100px;
    background:var(--card);border:1px solid var(--line);color:var(--mut2);white-space:nowrap;}
  .jl.on{background:var(--peach);border-color:var(--peach);color:#2E3542;}
  .jl.done{border-color:var(--good);color:var(--good);}
  .note{font-size:12px;color:var(--mut);line-height:1.55;background:var(--card);
    border-left:3px solid var(--peach);border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:14px;}
  .facts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .fact{font-size:11px;font-weight:600;background:var(--card);border:1px solid var(--line);
    border-radius:100px;padding:6px 10px;color:var(--mut);}
  .fact.p{color:var(--peach);border-color:rgba(233,165,127,.45);}
  .fact.g{color:var(--good);border-color:rgba(127,214,155,.45);}
  .fact.e{color:var(--gold);border-color:rgba(235,199,126,.5);}
  h2{font-size:10.5px;font-weight:700;letter-spacing:.15em;color:var(--peach);text-transform:uppercase;
    margin:22px 0 9px;display:flex;align-items:center;gap:8px;}
  h2 em{font-style:normal;color:var(--mut2);font-size:10px;letter-spacing:.03em;font-weight:500;margin-left:auto;}
  select,input{font-family:inherit;color:var(--white);background:rgba(0,0,0,.26);
    border:1px solid var(--line);border-radius:11px;outline:none;font-size:15px;}
  select{width:100%;padding:12px;-webkit-appearance:none;appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239BA2B1' stroke-width='2.4'><path d='m6 9 6 6 6-6' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat;background-position:right 11px center;background-size:15px;}
  input{width:100%;padding:12px;}
  input:focus,select:focus{border-color:var(--peach);}
  .tgl{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:11px;padding:12px 13px;margin-top:8px;font-size:14.5px;font-weight:500;}
  .tgl.on{background:rgba(127,214,155,.15);border-color:rgba(127,214,155,.5);color:var(--good);font-weight:600;}
  .tgl .b{width:19px;height:19px;border-radius:6px;border:2px solid var(--mut2);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;}
  .tgl.on .b{background:var(--good);border-color:var(--good);}
  .tgl .b svg{width:11px;height:11px;stroke:#2E3542;fill:none;stroke-width:3.6;opacity:0;}
  .tgl.on .b svg{opacity:1;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);
    border-radius:100px;padding:10px 13px;font-size:13.5px;font-weight:500;color:var(--mut2);min-height:42px;user-select:none;}
  .chip:active{transform:scale(.96);}
  .chip.on{background:rgba(233,165,127,.2);border-color:var(--peach);color:var(--white);font-weight:600;}
  .chip.lap{border-color:rgba(233,165,127,.5);color:var(--peach);}
  .chip.lap.on{background:rgba(233,165,127,.28);color:#fff;}
  .chip.lap.covered{background:rgba(76,169,108,.12);border-color:rgba(76,169,108,.4);color:#7FC79A;font-weight:600;}
  .chip.dlp{border-color:rgba(143,180,216,.45);color:#8FB4D8;}
  .chip.dlp.on{background:rgba(143,180,216,.2);border-color:#8FB4D8;color:#fff;}
  .lcopy{margin-top:12px;width:100%;font-size:12.5px;font-weight:700;padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--card);color:var(--peach);letter-spacing:.03em;}
  .lclip{margin-top:12px;padding:11px;border-radius:11px;background:rgba(233,165,127,.14);border:1px solid rgba(233,165,127,.45);color:var(--peach);font-size:12px;font-weight:600;line-height:1.7;}
  .lcb{display:inline-block;margin:5px 6px 0 0;font-size:11px;font-weight:700;padding:6px 11px;border-radius:8px;background:var(--peach);color:#2E3542;border:none;}
  .lcx{display:inline-block;margin-top:5px;font-size:10.5px;font-weight:700;padding:6px 10px;border-radius:8px;background:transparent;border:1px solid rgba(233,165,127,.5);color:var(--peach);}
  .msbanner{margin-top:10px;padding:9px 11px;border-radius:10px;background:rgba(143,180,216,.12);border:1px solid rgba(143,180,216,.35);color:#8FB4D8;font-size:11.5px;font-weight:600;line-height:1.5;}
  .topbanner{margin-top:10px;padding:9px 11px;border-radius:10px;background:rgba(235,199,126,.12);border:1px solid rgba(235,199,126,.4);color:var(--gold);font-size:11.5px;font-weight:600;line-height:1.5;}
  .fact.bg{border-color:rgba(76,169,108,.5);color:#7FC79A;}
  .bgbanner{margin-top:10px;padding:9px 11px;border-radius:10px;background:rgba(76,169,108,.1);border:1px solid rgba(76,169,108,.35);color:#7FC79A;font-size:11.5px;font-weight:600;line-height:1.5;}
  .chip.clust{border-color:rgba(143,180,216,.5);color:#8FB4D8;}
  .chip.clust.on{background:rgba(143,180,216,.2);color:#fff;border-color:#8FB4D8;}
  .cpb{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--mut);font-size:12px;flex-shrink:0;}
  .clipbar{margin:2px 0 12px;padding:9px 11px;border-radius:10px;background:rgba(233,165,127,.14);border:1px solid rgba(233,165,127,.45);color:var(--peach);font-size:11.5px;font-weight:600;line-height:1.5;}
  .cbx{margin-left:6px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:7px;background:transparent;border:1px solid rgba(233,165,127,.5);color:var(--peach);}
  .dup{width:30px;flex-shrink:0;border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--peach);border-radius:9px;font-size:12px;}
  .ptb{font-size:10px;font-weight:700;padding:4px 8px;margin-left:4px;border-radius:7px;background:var(--peach);color:#2E3542;border:none;letter-spacing:.03em;flex-shrink:0;}
  .dlrow{display:flex;gap:14px;margin-top:9px;flex-wrap:wrap;}
  .dlf{font-size:12.5px;color:var(--mut);display:flex;align-items:center;gap:6px;}
  .dlmin{width:54px;text-align:center;font-size:13px;padding:8px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--white);}
  .dlfeed{margin-top:10px;font-size:12px;color:var(--mut);line-height:1.55;}
  .dlfeed .sk{color:var(--gold);}
  .dlchip{padding:8px 11px;border-radius:9px;background:rgba(143,180,216,.14);border:1px solid rgba(143,180,216,.4);color:#8FB4D8;font-size:12px;font-weight:600;}
  .dlchip.sk{background:rgba(235,199,126,.12);border-color:rgba(235,199,126,.4);color:var(--gold);}
  .dlland{margin-top:8px;font-size:12px;color:var(--mut);line-height:1.55;}
  .dlland b{color:#8FB4D8;}
  .dlland .wk{color:var(--gold);}
  .m{flex-shrink:0;display:inline-block;}
  .m.easiest{width:10px;height:10px;border-radius:50%;background:#4CA96C;}
  .m.more{width:10px;height:10px;background:#3B7FDE;}
  .m.most{width:9px;height:9px;background:#0E1420;border:1.4px solid #EAF0FA;transform:rotate(45deg);}
  .m.extreme{width:9px;height:9px;background:#0E1420;border:1.4px solid #EAF0FA;transform:rotate(45deg);
    box-shadow:4px -4px 0 -1px #0E1420, 4px -4px 0 0 #EAF0FA;margin-right:5px;}
  .m.road{width:10px;height:10px;border-radius:50%;background:transparent;border:1.4px dashed #6FA8E0;}
  .m.unknown{width:10px;height:10px;border-radius:50%;background:transparent;border:1.4px dashed var(--gold);}
  .m.park{width:11px;height:11px;border-radius:3px;background:#F2941E;}
  .m.road_green{width:10px;height:10px;border-radius:50%;background:transparent;border:1.6px dashed #4CA96C;}
  .m.road_blue{width:10px;height:10px;border-radius:50%;background:transparent;border:1.6px dashed #3B7FDE;}
  .m.road_black{width:10px;height:10px;border-radius:50%;background:transparent;border:1.6px dashed #EAF0FA;}
  .ex{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:8px;}
  .ex.neg{border-color:rgba(224,133,133,.55);background:rgba(224,133,133,.09);}
  .ex.seed{border-color:rgba(143,180,216,.5);}
  .ex .top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .ex .top b{flex:1;font-size:14.5px;font-weight:600;}
  .ex .top .rc{font-size:9.5px;font-weight:700;letter-spacing:.07em;color:var(--peach);
    background:rgba(233,165,127,.16);border-radius:100px;padding:4px 8px;flex-shrink:0;}
  .ex .x{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.09);border:none;
    color:var(--mut2);font-size:16px;line-height:1;flex-shrink:0;}
  .rt{display:flex;gap:8px;margin-bottom:8px;}
  .rn{width:21px;height:21px;border-radius:6px;flex-shrink:0;margin-top:11px;
    background:rgba(255,255,255,.1);color:var(--mut2);font-size:10.5px;font-weight:700;
    display:flex;align-items:center;justify-content:center;}
  .rb{flex:1;min-width:0;}
  .rb input{font-size:13.5px;padding:10px;}
  .rr{display:flex;gap:6px;margin-top:6px;}
  .rr select{flex:1;font-size:12.5px;padding:9px 10px;}
  .rr input.min{width:62px;text-align:center;flex-shrink:0;font-size:12.5px;padding:9px;}
  .pkb{margin-top:7px;font-size:11px;font-weight:700;padding:6px 11px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--peach);font-family:inherit;letter-spacing:.03em;}
  .pkb:active{transform:scale(.97);}
  .pkp{margin-top:8px;padding:9px;border:1px solid var(--line);border-radius:11px;background:rgba(0,0,0,.2);}
  .chip.pk{padding:7px 10px;font-size:12px;min-height:34px;}
  .rx{width:36px;flex-shrink:0;border:1px solid var(--line);background:rgba(255,255,255,.07);
    color:var(--mut2);border-radius:9px;font-size:15px;line-height:1;}
  .addr{width:100%;margin-top:2px;padding:10px;border-radius:10px;font-family:inherit;
    font-size:12.5px;font-weight:600;color:var(--peach);background:rgba(233,165,127,.12);
    border:1px dashed rgba(233,165,127,.45);}
  .zh{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--mut2);text-transform:uppercase;margin:0 0 7px;}
  footer{flex-shrink:0;padding:9px 11px calc(env(safe-area-inset-bottom) + 9px);
    background:rgba(0,0,0,.3);border-top:1px solid var(--line);display:flex;gap:7px;}
  .fbtn{flex:1;border:none;font-family:inherit;font-size:13.5px;font-weight:700;letter-spacing:.04em;
    border-radius:13px;padding:14px 8px;background:var(--card);color:var(--white);border:1px solid var(--line);min-height:48px;}
  .fbtn:active{transform:scale(.97);}
  .fbtn.p{background:linear-gradient(160deg,var(--peach),var(--peach2));color:#2E3542;border:none;}
  .fbtn.done{background:rgba(127,214,155,.2);border-color:var(--good);color:var(--good);}
  .fbtn.w{flex:0 0 50px;}
  .sheet{position:fixed;inset:0;background:#2E3543;z-index:60;display:none;flex-direction:column;}
  .sheet.on{display:flex;}
  .sheet .sh{display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 11px) 11px 11px;border-bottom:1px solid var(--line);}
  .sheet .sh b{flex:1;font-size:14px;}
  .sheet textarea{flex:1;background:#232937;border:none;color:#C9D3E4;padding:11px;
    font-family:ui-monospace,Menlo,monospace;font-size:10.5px;line-height:1.6;resize:none;outline:none;}
  .sbtn{border:1px solid var(--line);background:rgba(255,255,255,.1);color:var(--white);
    font-family:inherit;font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:9px;}
  .sbtn.p{background:var(--peach);color:#2E3542;border:none;}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(90px);
    background:var(--peach);color:#2E3542;font-size:12.5px;font-weight:700;padding:10px 18px;
    border-radius:100px;z-index:80;transition:transform .25s;white-space:nowrap;}
  .toast.on{transform:translateX(-50%) translateY(0);}

  .seg{display:flex;gap:6px;margin:16px 0 4px;background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:12px;padding:4px;}
  .seg button{flex:1;font-family:inherit;font-size:11.5px;font-weight:700;letter-spacing:.03em;padding:11px 6px;border-radius:9px;border:none;background:transparent;color:var(--mut2);}
  .seg button.on{background:var(--peach);color:#2E3542;}
  .weldbox{margin-top:12px;padding:10px 11px;border-radius:12px;background:rgba(143,180,216,.1);border:1px solid rgba(143,180,216,.35);}
  .weldbox .wt{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#8FB4D8;margin-bottom:7px;}
  .weldrow{font-size:12.5px;color:#cfe0f2;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:6px;line-height:1.4;}
  .weldrow .wx{margin-left:auto;width:24px;height:24px;border-radius:7px;border:1px solid rgba(143,180,216,.4);background:transparent;color:#8FB4D8;font-size:14px;flex-shrink:0;}
  .chip.weld{border-color:rgba(143,180,216,.5);color:#8FB4D8;}
  .chip.weld.on{background:rgba(143,180,216,.22);color:#fff;border-color:#8FB4D8;}
  .chainb{margin:8px 0 2px;font-size:11px;font-weight:700;padding:7px 11px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:#8FB4D8;font-family:inherit;letter-spacing:.03em;}
  .chainb.on{background:rgba(143,180,216,.2);border-color:#8FB4D8;color:#fff;}
  .chip.chn{border-color:rgba(143,180,216,.5);color:#8FB4D8;}
  .chip.chn.on{background:rgba(143,180,216,.22);color:#fff;border-color:#8FB4D8;}
  .chip.seg{border-color:rgba(143,180,216,.55);color:#8FB4D8;}
  .chip.seg:active{transform:scale(.96);}
  .segtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
  .segtag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:#8FB4D8;background:rgba(143,180,216,.14);border:1px solid rgba(143,180,216,.4);border-radius:8px;padding:5px 4px 5px 8px;}
  .segtag button{width:20px;height:20px;border:none;background:transparent;color:#8FB4D8;font-size:14px;line-height:1;}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="nav" id="prev">&lsaquo;</div>
    <div class="htitle"><b id="pname">…</b><span id="pmeta"></span></div>
    <div class="nav" id="next">&rsaquo;</div>
  </div>
  <div class="bar"><i id="pbar" style="width:0%"></i></div>
  <div class="srow">
    <span class="stat" id="sstat">…</span>
    <span class="stat" id="sedits">0 edited</span>
    <span class="sp"></span>
    <button class="mini" id="bundo" style="display:none">↩ Undo</button>
    <button class="mini p" id="brestore">Restore full work</button>
    <button class="mini" id="bclear">Clear runs</button>
    <button class="mini" id="bimport">Import</button>
    <button class="mini p" id="bexport">Copy my work</button>
  </div>
</header>
<main id="main"></main>
<footer>
  <button class="fbtn w" id="fprev">&lsaquo;</button>
  <button class="fbtn" id="fver">Mark verified</button>
  <button class="fbtn p w" id="fnext">&rsaquo;</button>
</footer>
<div class="sheet" id="sheet">
  <div class="sh"><b id="stitle">Copy my work</b>
    <button class="sbtn p" id="scopy">Copy</button>
    <button class="sbtn" id="sload" style="display:none">Load</button>
    <button class="sbtn" id="sclose">Close</button></div>
  <textarea id="out"></textarea>
</div>
<div class="toast" id="toast"></div>
<script>
const PODS=[
  {id:"p1",num:"1",name:"Gondola One",base:"Vail Village",zone:"Front Side",rise:1996,ride:7.8,lt:"gondola_10",dl:1,note:"LIFTBLOG: 1,996 ft rise \u00b7 9,308 ft long \u00b7 7.8 min ride \u00b7 Leitner-Poma 2012- \u00b7 3,600/hr  CORRECTED BY HAYDEN 15 Jul. This lift previously carried 8,120 to 10,350, which is EAGLE BAHN #19's Lionshead-to-Eagle's-Nest. Vail has two different bases and they are 80 ft apart. The map proves it in metric: Vail Village 2,500m = 8,200 ft, Lionshead 2,475m = 8,120 ft. Rise is 1,990, not 2,230. Terrible rate either way. Access lift, never a lapper.",runs:["gitalong_road", "riva_ridge_top", "pepis_face", "head_first", "mill_creek_road", "mudslide", "frontside_chutes", "giant_steps", "lindseys"]},

  document.getElementById("ar").onclick=()=>{

function go(d){ i=Math.max(0,Math.min(PODS.length-1,i+d)); q=""; pick=null; pq=""; clip=null; secMode="top"; document.getElementById("main").scrollTop=0; render(); }
document.getElementById("fver").onclick=()=>{ st().ok=!st().ok; touch();
  if(st().ok&&i<PODS.length-1){ toast("Verified"); i++; document.getElementById("main").scrollTop=0; } q=""; render(); };
document.getElementById("fnext").onclick=()=>go(1);
document.getElementById("fprev").onclick=()=>go(-1);
document.getElementById("prev").onclick=()=>go(-1);
document.getElementById("next").onclick=()=>go(1);

function exportJSON(){
  const Rs=RR();
  return {_meta:{resort:"vail",built:new Date().toISOString().slice(0,10),
      source:"Liftblog specs + Vail official trail maps. Edited and verified by Hayden Swope, local.",
      verified:PODS.filter(p=>S[p.id].ok).map(p=>p.id),
      edited:PODS.filter(p=>S[p.id].touched).map(p=>p.id)},
    pods:PODS.map(p=>{const s=S[p.id];return{id:p.id,lift_num:p.num,name:p.name,zone:p.zone,
      lift_type:s.lt,download_allowed:!!s.dl,rise_ft:p.rise,ride_min:p.ride,
      verified:s.ok,edited:!!s.touched,
      runs_off_top:s.runs.map(r=>({id:r,name:Rs[r]?Rs[r][0]:r,difficulty:Rs[r]?Rs[r][1]:"unknown"}))};}),
    edges:(function(){
      function build(field,suffix){
        return Object.entries(S).flatMap(kv=>Object.entries(kv[1][field]||{}).flatMap(k2=>{
          const dest=k2[0], grp=k2[1], isDL=dest.slice(0,3)==="dl:", tgts=isDL?[dest.slice(3)]:(BASECLUSTER[dest]?BASECLUSTER[dest].lifts:[dest]);
          return (grp.routes||[]).flatMap((r,n)=>tgts.map(tg=>Object.assign({from:kv[0]+suffix,to:tg+(isDL?".download_platform":".base"),route:n+1,
            mode:r.mode,connector:r.via||null,minutes:r.min?Number(r.min):null,
            penalty:r.mode==="skate"?"SEVERE":(r.mode==="forbidden"?"BLOCKED":null),
            snowboard:r.mode==="skate"?"DISQUALIFIED":null,
            _src:r.seed?"seed":"hayden"},
            (field==="exits2"?{from_loading:true}:{}),
            (r.segs&&r.segs.length?{continues_into:r.segs.map(sid=>{const a2=sid.split("|");const fn=a2[0]+(a2[1]==="l"?".base":".top");const dd=a2.slice(2).join("|");let tn;if(dd.slice(0,3)==="dl:")tn=dd.slice(3)+".download_platform";else if(BASECLUSTER[dd])tn="cluster:"+dd;else tn=dd+".base";return {segment:sid,from:fn,to:tn};})}:{}),
            isDL?{to_download_platform:dlNum(dest.slice(3))}:(BASECLUSTER[dest]?{via_cluster:dest,cluster_name:BASECLUSTER[dest].name}:{}))));
        }));
      }
      return build("exits",".top").concat(build("exits2",".base"));
    })(),
    downloads:Object.keys(DOWNLOADS).map(id=>{const c=DOWNLOADS[id],pp=PODS.find(x=>x.id===id);return{lift:id,lift_num:pp.num,name:pp.name,to_base_min:dlBase(id),to_mid_min:dlMid(id)!=null?dlMid(id):null,to_mid_pod:c.midPod||null,lands_at:(function(){const ck=clusterOf(id);if(!ck)return null;const cl=BASECLUSTER[ck];return{cluster:ck,name:cl.name,lift_bottoms:cl.lifts.map(fx=>({lift:fx,lift_num:dlNum(fx)})),walk:walkFrom(ck).map(w=>({to_cluster:w.cluster,name:BASECLUSTER[w.cluster].name,min:w.min,note:w.note,lift_bottoms:BASECLUSTER[w.cluster].lifts.map(fx=>({lift:fx,lift_num:dlNum(fx)}))}))};})(),feeders:[{lift:id,lift_num:pp.num,note:"own top"}].concat(c.feeders.map(fid=>({lift:fid,lift_num:dlNum(fid)}))),skate_feeders:(c.skate||[]).map(fid=>({lift:fid,lift_num:dlNum(fid),note:"skate uphill, rarely used"}))};}),
    midstations:Object.keys(MIDSTATIONS).map(id=>{const m=MIDSTATIONS[id],pp=PODS.find(x=>x.id===id),bl=BASECLUSTER[m.board];return{pod:id,name:pp?pp.name:id,parent_lift:m.lift,parent_num:dlNum(m.lift),board_at:m.board,board_name:bl?bl.name:m.board,access:["ride "+dlNum(m.lift)+" up from "+(bl?bl.name:m.board)+", unload at mid","download "+dlNum(m.lift)+" from the top to the mid"]};}),
    lifts_at_top:Object.keys(ATTOP).map(id=>({at_lift:id,at_num:dlNum(id),reach:ATTOP[id].map(a=>({lift:a.lift,lift_num:dlNum(a.lift),direction:a.dir,note:"nearly no skiing"}))})),
    beginner_carpets:Object.keys(BEGINNER).map(id=>({lift:id,lift_num:dlNum(id),pod:BEGINNER[id].pod,interacts_with:BEGINNER[id].with.map(x=>({lift:x,lift_num:dlNum(x)})),excluded_from_mountain_plan:true,excluded_from_challenge:true})),
    welds:welds.map(w=>({node_a:w.a,node_b:w.b,note:w.note||""}))
  };

function applyExport(d){
  if(!d||!d.pods) return false;
  d.pods.forEach(p=>{ if(S[p.id]){
    S[p.id].runs=migrateRuns(p.runs_off_top.map(r=>r.id)); S[p.id].ok=!!p.verified;
    S[p.id].touched=!!p.edited; S[p.id].lt=p.lift_type||S[p.id].lt; S[p.id].dl=!!p.download_allowed;
    p.runs_off_top.forEach(r=>{ if(!R[r.id]) extra[r.id]=[r.name,r.difficulty]; ratings[r.id]=r.difficulty; }); }});
  Object.values(S).forEach(s=>{ s.exits={}; s.exits2={}; });
  (d.edges||[]).forEach(e=>{
    const fromBase=/\.base$/.test(e.from)||e.from_loading===true;
    const f=e.from.replace(/\.(top|base)$/,"");
    if(!S[f]) return;
    const field=fromBase?"exits2":"exits";
    let to; if(/\.download_platform$/.test(e.to)) to="dl:"+e.to.replace(/\.download_platform$/,""); else to=e.to.replace(/\.base$/,"");
    if(!S[f][field][to]) S[f][field][to]={routes:[]};
    S[f][field][to].routes.push({mode:e.mode,via:e.connector||"",min:e.minutes==null?"":e.minutes,seed:e._src==="seed"?1:0});
    if(Array.isArray(e.continues_into)){ const _r=S[f][field][to].routes[S[f][field][to].routes.length-1]; _r.segs=e.continues_into.map(c=>c.segment).filter(Boolean); }
  });
  (d.downloads||[]).forEach(dl=>{ if(S[dl.lift]){ if(dl.to_base_min!=null) S[dl.lift].dlbase=dl.to_base_min; if(dl.to_mid_min!=null) S[dl.lift].dlmid=dl.to_mid_min; } });
  if(Array.isArray(d.welds)) welds=d.welds.map(w=>({a:w.node_a,b:w.node_b,note:w.note||""}));
  mergeSeedWelds();
  clusterize(); stripBeginner(); return true;
}
